name: Deploy to Hostinger Cloud

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_mysql

      - name: 📦 Install PHP Dependencies
        run: composer install --optimize-autoloader --no-dev --no-interaction --prefer-dist

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🛠️ Build Frontend Assets
        run: |
          npm install
          npm run build

      - name: 🚀 Sync Files to Hostinger
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          ARGS: "-rltgoDzvO --delete"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.HOSTINGER_HOST }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_PORT }}
          REMOTE_USER: ${{ secrets.HOSTINGER_USERNAME }}
          TARGET: "public_html/"
          # EXTREMELY IMPORTANT: Exclude .env and storage so they aren't deleted from the live server!
          EXCLUDE: "/.git/, /node_modules/, /.github/, /.env, /storage/, /bootstrap/cache/"

      - name: ⚙️ Run Final Server Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            cd public_html
            mkdir -p bootstrap/cache storage/framework/views storage/framework/cache storage/framework/sessions
            chmod -R 775 bootstrap/cache storage
            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize
